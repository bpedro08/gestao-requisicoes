<nav class="navbar" *ngIf="auth.isLoggedIn()">
  <div class="navbar-brand">
    <span>ReqManager</span>
  </div>

  <div class="navbar-links">

    <!-- visible to everyone -->
    <a routerLink="/requests">{{ auth.isAdmin() ? 'Requests' : 'My Requests' }}</a>

    <!-- admin only -->
    <ng-container *ngIf="auth.isAdmin()">
      <a routerLink="/resources">Resources</a>
      <a routerLink="/approval">Approvals</a>
    </ng-container>

  </div>

  <div class="navbar-user">
    <span class="user-name">{{ auth.currentUser()?.name }}</span>
    <span class="user-role">{{ auth.currentUser()?.role }}</span>
    <button (click)="logout()">Logout</button>
  </div>
</nav>
