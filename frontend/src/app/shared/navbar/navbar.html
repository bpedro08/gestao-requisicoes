@if (auth.isLoggedIn()) {
  <nav class="navbar">
    <div class="navbar-brand">
      <span>ReqManager</span>
    </div>

    <div class="navbar-links">
      <a routerLink="/requests" routerLinkActive="active-link">
        {{ auth.isAdmin() ? 'All Requests' : 'My Requests' }}
      </a>

      <!-- Admin only -->
      @if (auth.isAdmin()) {
        <a routerLink="/resources" routerLinkActive="active-link">Resources</a>
        <a routerLink="/approval" routerLinkActive="active-link">Approvals</a>
      }
    </div>

    <div class="navbar-user">
      <span class="user-name">{{ auth.currentUser()?.name }}</span>
      <span class="user-role">{{ auth.currentUser()?.role }}</span>
      <button (click)="logout()">Logout</button>
    </div>
  </nav>
}
