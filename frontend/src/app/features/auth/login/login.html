<div class="login-wrapper">
  <div class="login-card">
    <h2>Sign in</h2>
    <p class="subtitle">Resource Request Management</p>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="field">
        <label>Email</label>
        <input type="email" formControlName="email" placeholder="your@email.com" />
        @if (form.get('email')?.invalid && form.get('email')?.touched) {
          <span class="error-msg"> Valid email is required </span>
        }
      </div>

      <div class="field">
        <label>Password</label>
        <input type="password" formControlName="password" placeholder="••••••••" />
        @if (form.get('password')?.invalid && form.get('password')?.touched) {
          <span class="error-msg"> Password is required </span>
        }
      </div>

      @if (error) {
        <span class="error-msg server-error">{{ error }}</span>
      }

      <button type="submit" [disabled]="loading">
        {{ loading ? 'Signing in...' : 'Sign in' }}
      </button>
    </form>
  </div>
</div>
