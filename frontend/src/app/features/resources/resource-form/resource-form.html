<div class="form-card">
  <h3>{{ isEditMode ? 'Edit Resource' : 'New Resource' }}</h3>

  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="field">
      <label>Name</label>
      <input type="text" formControlName="name" placeholder="Resource name" />
      @if (form.get('name')?.invalid && form.get('name')?.touched) {
        <span class="error-msg"> Name is required </span>
      }
    </div>

    <div class="field">
      <label>Type</label>
      <select formControlName="type">
        <option value="">Select a type</option>
        @for (t of types; track t) {
          <option [value]="t">{{ t }}</option>
        }
      </select>
      @if (form.get('type')?.invalid && form.get('type')?.touched) {
        <span class="error-msg"> Type is required </span>
      }
    </div>

    <div class="field">
      <label>Description <span class="optional">(optional)</span></label>
      <textarea
        formControlName="description"
        rows="3"
        placeholder="Brief description..."
      ></textarea>
    </div>

    @if (error) {
      <div class="error-msg server-error">{{ error }}</div>
    }

    <div class="form-actions">
      <button type="button" class="btn-secondary" (click)="cancelled.emit()">Cancel</button>
      <button type="submit" [disabled]="loading">
        {{ loading ? 'Saving...' : isEditMode ? 'Save Changes' : 'Create Resource' }}
      </button>
    </div>
  </form>
</div>
